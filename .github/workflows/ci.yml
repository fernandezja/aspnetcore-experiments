name: CI

on:
  push:
    branches: '*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build all solutions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Find and build all .slnx files
        run: |
          set -e
          mapfile -d '' slnx_files < <(find . -name "*.slnx" -print0)

          if [ ${#slnx_files[@]} -eq 0 ]; then
            echo "No .slnx files found."
            exit 1
          fi

          echo "Found ${#slnx_files[@]} solution(s):"
          for slnx in "${slnx_files[@]}"; do
            echo "  - $slnx"
          done

          failed=0
          for slnx in "${slnx_files[@]}"; do
            echo ""
            echo "::group::Building $slnx"
            if dotnet build "$slnx" --configuration Release --no-incremental; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::Build failed for $slnx"
              failed=1
            fi
          done

          if [ $failed -ne 0 ]; then
            echo "::error::One or more solutions failed to build."
            exit 1
          fi

          echo ""
          echo "All solutions built successfully."
